<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lendas do Futebol — Álbum de Figurinhas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#0b1f17;
    --pitch-2:#0e2419;
    --pitch-3:#132e21;
    --paper:#f7f3e8;
    --paper-2:#eee6d0;
    --gold:#d4af37;
    --gold-2:#f2d775;
    --gold-dim:#8a742a;
    --ink:#111813;
    --line:rgba(212,175,55,.42);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}

  body{
    font-family:"Oswald",Arial,sans-serif;
    background:
      radial-gradient(ellipse 120% 90% at 50% -10%, var(--pitch-3) 0%, var(--pitch) 55%, #071510 100%);
    color:var(--paper);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* textura sutil de couro/gramado */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(115deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:1;
  }

  body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse 60% 40% at 50% 100%, rgba(0,0,0,.55), transparent 70%);
    pointer-events:none;
    z-index:1;
  }

  /* lombada do livro */
  .spine{
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    width:34px;
    background:linear-gradient(90deg, #05100b 0%, var(--pitch-2) 55%, rgba(0,0,0,.35) 100%);
    box-shadow:2px 0 18px rgba(0,0,0,.5);
    z-index:2;
  }
  .spine::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 34px,
      rgba(212,175,55,.14) 34px, rgba(212,175,55,.14) 36px
    );
  }

  .cover{
    position:relative;
    z-index:3;
    width:min(560px, 88vw);
    margin-left:34px;
    padding:min(7vh,56px) 44px;
    background:
      linear-gradient(155deg, var(--pitch-3) 0%, var(--pitch-2) 55%, var(--pitch) 100%);
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:
      0 30px 70px rgba(0,0,0,.55),
      inset 0 0 0 1px rgba(212,175,55,.08),
      inset 0 1px 0 rgba(255,255,255,.03);
    text-align:center;
    transition:transform .5s cubic-bezier(.4,0,.2,1), box-shadow .5s ease, opacity .5s ease;
  }

  .cover::before{
    content:"";
    position:absolute;
    inset:14px;
    border:1px solid rgba(212,175,55,.22);
    border-radius:3px;
    pointer-events:none;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:.42em;
    color:var(--gold-dim);
    text-transform:uppercase;
    margin-bottom:22px;
  }

  .crest{
    width:76px;
    height:76px;
    margin:0 auto 22px;
    opacity:.95;
  }

  h1{
    font-family:"Fraunces",Georgia,serif;
    font-weight:600;
    font-optical-sizing:auto;
    font-size:clamp(38px, 6.4vw, 54px);
    line-height:1.02;
    letter-spacing:.01em;
    background:linear-gradient(115deg, var(--gold-dim) 0%, var(--gold-2) 30%, var(--gold) 50%, var(--gold-2) 70%, var(--gold-dim) 100%);
    background-size:220% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shine 7s ease-in-out infinite;
  }

  h1 em{
    font-style:normal;
    display:block;
    font-weight:300;
    font-size:.6em;
    letter-spacing:.06em;
    margin-top:2px;
  }

  @keyframes shine{
    0%,100%{background-position:0% 50%}
    50%{background-position:100% 50%}
  }

  .subtitle{
    margin-top:18px;
    font-family:Georgia,"Times New Roman",serif;
    font-style:italic;
    font-weight:400;
    font-size:15px;
    color:var(--paper-2);
    opacity:.78;
    letter-spacing:.01em;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:30px auto 26px;
    width:74%;
    color:var(--gold-dim);
  }
  .divider::before,.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--line), transparent);
  }
  .divider span{
    font-size:10px;
    letter-spacing:.3em;
  }

  .stats{
    display:flex;
    justify-content:center;
    gap:28px;
    margin-bottom:36px;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--paper-2);
    opacity:.7;
  }
  .stats b{
    display:block;
    font-family:"Fraunces",serif;
    font-size:20px;
    font-weight:600;
    color:var(--gold-2);
    letter-spacing:0;
    margin-bottom:2px;
  }

  .seal{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:136px;
    height:136px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--gold-2) 0%, var(--gold) 45%, var(--gold-dim) 100%);
    color:var(--ink);
    font-family:"Oswald",Arial,sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:.12em;
    text-transform:uppercase;
    text-decoration:none;
    box-shadow:
      0 14px 30px rgba(0,0,0,.45),
      inset 0 2px 4px rgba(255,255,255,.4),
      inset 0 -6px 10px rgba(0,0,0,.25);
    border:3px solid var(--pitch);
    outline-offset:4px;
    transition:transform .25s ease, box-shadow .25s ease;
    cursor:pointer;
  }
  .seal::before{
    content:"";
    position:absolute;
    inset:8px;
    border-radius:50%;
    border:1px dashed rgba(17,24,19,.35);
  }
  .seal:hover{
    transform:scale(1.045);
    box-shadow:
      0 18px 38px rgba(0,0,0,.5),
      inset 0 2px 4px rgba(255,255,255,.5),
      inset 0 -6px 10px rgba(0,0,0,.25);
  }
  .seal:active{transform:scale(.98)}
  .seal:focus-visible{outline:2px solid var(--gold-2)}

  .seal-wrap{margin-top:6px}

  .arrow-hint{
    display:block;
    margin-top:14px;
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold-dim);
    opacity:.85;
  }

  .footer-mark{
    position:fixed;
    bottom:22px;
    right:28px;
    z-index:3;
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--gold-dim);
    opacity:.6;
    text-align:right;
    line-height:1.6;
  }

  @media (max-width:560px){
    .spine{width:20px}
    .cover{margin-left:20px;padding:44px 26px}
    .stats{gap:18px}
    .footer-mark{display:none}
  }

  /* transição de saída ao clicar em Entrar */
  body.leaving .cover{
    transform:scale(.92) rotateY(8deg);
    opacity:0;
  }
  body.leaving::after{
    background:radial-gradient(circle at 50% 55%, rgba(242,215,117,.25), rgba(0,0,0,.85) 70%);
    transition:background .55s ease;
  }

  @media (prefers-reduced-motion: reduce){
    h1{animation:none}
    .cover, body.leaving .cover, body.leaving::after{transition:none}
  }
</style>
</head>
<body>

  <div class="spine" aria-hidden="true"></div>

  <main class="cover">
    <div class="eyebrow">Álbum oficial de figurinhas</div>

    <svg class="crest" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M50 6 L58 26 L80 26 L62 39 L69 60 L50 47 L31 60 L38 39 L20 26 L42 26 Z"
            fill="url(#g)" stroke="#8a742a" stroke-width="1"/>
      <circle cx="50" cy="50" r="46" stroke="#8a742a" stroke-width="1.2" fill="none" opacity=".55"/>
      <defs>
        <linearGradient id="g" x1="20" y1="6" x2="80" y2="60" gradientUnits="userSpaceOnUse">
          <stop stop-color="#f2d775"/>
          <stop offset="1" stop-color="#d4af37"/>
        </linearGradient>
      </defs>
    </svg>

    <h1>Lendas do<em>Futebol</em></h1>

    <p class="subtitle">Craques que marcaram época, reunidos em figurinha</p>

    <div class="divider"><span>EDIÇÃO COMPLETA</span></div>

    <div class="stats">
      <div><b>48</b>Times</div>
      <div><b>+30</b>Lendas</div>
      <div><b>1</b>Álbum</div>
    </div>

    <div class="seal-wrap">
      <a href="album.html" class="seal" id="enterBtn">Entrar</a>
      <span class="arrow-hint">abrir o álbum</span>
    </div>
  </main>

  <div class="footer-mark">Coleção permanente<br>Nº 001 · edição digital</div>

  <script>
    document.getElementById('enterBtn').addEventListener('click', function(e){
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      e.preventDefault();
      document.body.classList.add('leaving');
      setTimeout(function(){ window.location.href = 'album.html'; }, 480);
    });
  </script>

</body>
</html>
